<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Resultado Metodo Simpson 1/3</title>

    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{

            --bg-main:#020617;
            --bg-secondary:#06142e;
            --bg-card:#10254d;

            --primary:#3b82f6;
            --primary-hover:#2563eb;

            --accent:#8ec5ff;

            --text:#ffffff;
            --text-soft:#cbd5e1;

            --border:rgba(255,255,255,0.08);

            --shadow:0 0 30px rgba(0,0,0,0.45);

        }

        body{

            font-family:Arial, sans-serif;

            background:
            radial-gradient(circle at top left, rgba(59,130,246,0.15), transparent 25%),
            linear-gradient(
                135deg,
                #020617,
                #06142e,
                #0b1f45
            );

            min-height:100vh;

            color:var(--text);

        }

        /* NAVBAR */

        .navbar{

            width:100%;

            background:rgba(8,21,47,0.9);

            backdrop-filter:blur(12px);

            padding:20px 40px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            border-bottom:1px solid var(--border);

            position:sticky;

            top:0;

            z-index:1000;

        }

        .logo{

            font-size:34px;

            font-weight:bold;

            color:white;

            letter-spacing:1px;

        }

        .nav-links{

            list-style:none;

            display:flex;

            gap:18px;

        }

        .nav-links a{

            text-decoration:none;

            color:white;

            padding:12px 18px;

            border-radius:12px;

            transition:0.3s ease;

            font-weight:500;

        }

        .nav-links a:hover{

            background:rgba(59,130,246,0.25);

            transform:translateY(-2px);

            box-shadow:0 0 15px rgba(59,130,246,0.4);

        }

        /* TITULO */

        h1{

            text-align:center;

            margin-top:40px;

            margin-bottom:15px;

            font-size:44px;

            letter-spacing:1px;

        }

        .resultado{

            text-align:center;

            font-size:30px;

            margin-bottom:35px;

            color:var(--accent);

            font-weight:bold;

        }

        .resultado span{

            color:white;

        }

        /* CONTENEDOR PRINCIPAL */

        .contenedor-principal{

            display:flex;

            gap:25px;

            align-items:flex-start;

            padding:20px 40px;

        }


        .tabla-container,
        .grafica-container{

            background:rgba(16,37,77,0.92);

            border:1px solid rgba(59,130,246,0.2);

            border-radius:22px;

            backdrop-filter:blur(12px);

            box-shadow:var(--shadow);

            transition:0.3s;

        }

        .tabla-container:hover,
        .grafica-container:hover{

            transform:translateY(-3px);

            border-color:rgba(59,130,246,0.4);

        }

        /* TABLA */

        .tabla-container{

            width:30%;

            padding:20px;

            overflow-y:auto;

            max-height:650px;

        }

        table{

            width:100%;

            border-collapse:collapse;

            color:white;

        }

        th{

            background:linear-gradient(
                135deg,
                #2563eb,
                #1d4ed8
            );

            color:white;

            padding:15px;

            position:sticky;

            top:0;

            font-size:16px;

        }

        td{

            padding:14px;

            text-align:center;

            border-bottom:1px solid rgba(255,255,255,0.08);

            transition:0.3s;

        }

        tr:nth-child(even){

            background:rgba(255,255,255,0.03);

        }

        tr:hover{

            background:rgba(59,130,246,0.18);

        }

        /* GRAFICA */

        .grafica-container{

            width:70%;

            padding:20px;

        }

        #grafica{

            width:100%;

            height:600px;

        }

        /* BOTON */

        .boton{

            display:flex;

            justify-content:center;

            margin:45px;

        }

        .boton a{

            text-decoration:none;

            background:linear-gradient(
                135deg,
                var(--primary),
                var(--primary-hover)
            );

            color:white;

            padding:16px 32px;

            border-radius:14px;

            font-size:18px;

            font-weight:bold;

            transition:0.3s ease;

            box-shadow:0 0 20px rgba(59,130,246,0.3);

        }

        .boton a:hover{

            transform:translateY(-4px) scale(1.05);

            box-shadow:0 0 25px rgba(59,130,246,0.7);

        }

        /* SCROLL */

        .tabla-container::-webkit-scrollbar{

            width:8px;

        }

        .tabla-container::-webkit-scrollbar-thumb{

            background:#2563eb;

            border-radius:10px;

        }

        /* RESPONSIVE */

        @media(max-width:1000px){

            .contenedor-principal{

                flex-direction:column;

            }

            .tabla-container,
            .grafica-container{

                width:100%;

            }

            .navbar{

                flex-direction:column;

                gap:20px;

            }

            .nav-links{

                flex-wrap:wrap;

                justify-content:center;

            }

            h1{

                font-size:32px;

            }

            .resultado{

                font-size:24px;

            }

        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

    <div class="logo">
        CalculoING
    </div>

    <ul class="nav-links">

        <li><a th:href="@{/}">Inicio</a></li>

        <li><a th:href="@{/trapezoidal}">Trapezoidal</a></li>

        <li><a th:href="@{/simpson13}">Simpson 1/3</a></li>

        <li><a th:href="@{/simpson38}">Simpson 3/8</a></li>

        <li><a th:href="@{/boole}">Boole</a></li>

        <li><a th:href="@{/simpsonAbierto}">Simpson Abierto</a></li>

    </ul>

</nav>

<!-- TITULO -->

<h1>METODO DE SIMPSON 1/3</h1>

<div class="resultado">

    Resultado Aproximado:

    <span th:text="${resultado.resultado}"></span>

</div>

<!-- CONTENIDO -->

<div class="contenedor-principal">

    <!-- TABLA -->

    <div class="tabla-container">

        <table>

            <tr>

                <th>X</th>

                <th>f(X)</th>

            </tr>

            <tr th:each="p : ${resultado.puntos}">

                <td th:text="${p.x}"></td>

                <td th:text="${p.y}"></td>

            </tr>

        </table>

    </div>

    <!-- GRAFICA -->

    <div class="grafica-container">

        <div id="grafica"></div>

    </div>

</div>

<!-- BOTON -->

<div class="boton">

    <a th:href="@{/simpson13}">

        ⬅ Volver

    </a>

</div>

<script th:inline="javascript">

    let x = /*[[${resultado.x}]]*/ [];

    let y = /*[[${resultado.y}]]*/ [];

    // CURVA PRINCIPAL

    let curva = {

        x: x,

        y: y,

        mode: 'lines+markers',

        type: 'scatter',

        name: 'Funcion',

        line: {

            color: '#3b82f6',

            width: 4,

            shape: 'spline'

        },

        marker: {

            size: 8,

            color: '#8ec5ff'

        }

    };

    let data = [curva];

    let layout = {

        title: {

            text: 'Visualizacion Metodo Simpson 1/3',

            font: {

                size: 24,

                color: '#ffffff'

            }

        },

        paper_bgcolor: '#10254d',

        plot_bgcolor: '#08152f',

        font: {

            color: '#ffffff'

        },

        xaxis: {

            title: 'X',

            gridcolor: 'rgba(255,255,255,0.1)',

            zerolinecolor: 'rgba(255,255,255,0.2)'

        },

        yaxis: {

            title: 'f(x)',

            gridcolor: 'rgba(255,255,255,0.1)',

            zerolinecolor: 'rgba(255,255,255,0.2)'

        },

        showlegend: true

    };

    Plotly.newPlot('grafica', data, layout);

    // ANIMACION

    let i = 0;

    function animarTrapecios() {

        if (i >= x.length - 1) {

            return;

        }

        let trapecio = {

            x: [

                x[i],

                x[i],

                x[i + 1],

                x[i + 1]

            ],

            y: [

                0,

                y[i],

                y[i + 1],

                0

            ],

            fill: 'toself',

            type: 'scatter',

            mode: 'lines',

            fillcolor: 'rgba(59,130,246,0.25)',

            line: {

                color: 'rgba(59,130,246,0.9)',

                width: 2

            },

            name: 'Area ' + (i + 1)

        };

        Plotly.addTraces('grafica', trapecio);

        i++;

    }

    setInterval(animarTrapecios, 1000);

</script>

</body>

</html>
