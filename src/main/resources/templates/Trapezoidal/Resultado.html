<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Resultado Metodo Trapezoidal</title>

    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --bg-main:#020617;
            --bg-secondary:#06142e;
            --bg-card:#10254d;

            --primary:#2f6bff;
            --primary-hover:#1f56d8;

            --button-dark:#1a2d5a;
            --button-hover:#28437f;

            --text:#ffffff;
            --text-soft:#c7d2fe;

            --border:#2f6bff;
        }

        body{

            font-family:Arial, sans-serif;

            background:linear-gradient(
                135deg,
                #020617,
                #06142e,
                #0b1f45
            );

            min-height:100vh;

            color:white;

        }

        /* NAVBAR */

        .navbar{

            width:100%;

            background:#08152f;

            padding:20px 40px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            border-bottom:1px solid rgba(255,255,255,0.1);

        }

        .logo{

            font-size:32px;

            font-weight:bold;

            color:white;

        }

        .nav-links{

            list-style:none;

            display:flex;

            gap:20px;

        }

        .nav-links a{

            text-decoration:none;

            color:white;

            padding:12px 18px;

            border-radius:12px;

            transition:0.3s;

        }

        .nav-links a:hover{

            background:#284b9b;

            transform:translateY(-2px);

        }

        /* TITULO */

        h1{

            text-align:center;

            margin-top:35px;

            margin-bottom:15px;

            font-size:42px;

        }

        .resultado{

            text-align:center;

            font-size:30px;

            margin-bottom:30px;

            color:#8ec5ff;

            font-weight:bold;

        }

        /* CONTENEDOR */

        .contenedor-principal{

            display:flex;

            gap:25px;

            align-items:flex-start;

            padding:20px 40px;

        }

        /* TABLA */

        .tabla-container{

            width:30%;

            background:rgba(16,37,77,0.95);

            border:1px solid rgba(47,107,255,0.3);

            padding:20px;

            border-radius:20px;

            backdrop-filter:blur(10px);

            box-shadow:0 0 25px rgba(0,0,0,0.4);

            overflow-y:auto;

            max-height:650px;

        }

        table{

            width:100%;

            border-collapse:collapse;

            color:white;

        }

        th{

            background:#2563eb;

            color:white;

            padding:14px;

            position:sticky;

            top:0;

        }

        td{

            padding:12px;

            text-align:center;

            border-bottom:1px solid rgba(255,255,255,0.1);

        }

        tr:nth-child(even){

            background:rgba(255,255,255,0.05);

        }

        tr:hover{

            background:rgba(47,107,255,0.2);

        }

        /* GRAFICA */

        .grafica-container{

            width:70%;

            background:rgba(16,37,77,0.95);

            border:1px solid rgba(47,107,255,0.3);

            padding:20px;

            border-radius:20px;

            backdrop-filter:blur(10px);

            box-shadow:0 0 25px rgba(0,0,0,0.4);

        }

        #grafica{

            width:100%;

            height:600px;

        }

        /* BOTON */

        .boton{

            display:flex;

            justify-content:center;

            margin:40px;

        }

        .boton a{

            text-decoration:none;

            background:var(--primary);

            color:white;

            padding:16px 28px;

            border-radius:12px;

            font-size:18px;

            font-weight:bold;

            transition:0.3s;

        }

        .boton a:hover{

            background:var(--primary-hover);

            transform:translateY(-3px) scale(1.05);

            box-shadow:0 0 20px rgba(47,107,255,0.7);

        }

        /* RESPONSIVE */

        @media(max-width:1000px){

            .contenedor-principal{

                flex-direction:column;

            }

            .tabla-container,
            .grafica-container{

                width:100%;

            }

            .navbar{

                flex-direction:column;

                gap:20px;

            }

            .nav-links{

                flex-wrap:wrap;

                justify-content:center;

            }

            h1{

                font-size:30px;

            }

            .resultado{

                font-size:24px;

            }

        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

    <div class="logo">

        CalculoING

    </div>

    <ul class="nav-links">

        <li>

            <a th:href="@{/}">

                Inicio

            </a>

        </li>

        <li>

            <a th:href="@{/trapezoidal}">

                Trapezoidal

            </a>

        </li>

        <li>

            <a th:href="@{/simpson13}">

                Simpson 1/3

            </a>

        </li>

        <li>

            <a th:href="@{/simpson38}">

                Simpson 3/8

            </a>

        </li>

        <li>

            <a th:href="@{/boole}">

                Boole

            </a>

        </li>

        <li>

            <a th:href="@{/simpsonAbierto}">

                Simpson Abierto

            </a>

        </li>

    </ul>

</nav>

<!-- TITULO -->

<h1>

    METODO TRAPEZOIDAL

</h1>

<div class="resultado">

    Resultado Aproximado:

    <span th:text="${resultado.resultado}"></span>

</div>

<!-- CONTENIDO -->

<div class="contenedor-principal">

    <!-- TABLA -->

    <div class="tabla-container">

        <table>

            <tr>

                <th>X</th>

                <th>f(X)</th>

            </tr>

            <tr th:each="p : ${resultado.puntos}">

                <td th:text="${p.x}"></td>

                <td th:text="${p.y}"></td>

            </tr>

        </table>

    </div>

    <!-- GRAFICA -->

    <div class="grafica-container">

        <div id="grafica"></div>

    </div>

</div>

<!-- BOTON -->

<div class="boton">

    <a th:href="@{/trapezoidal}">

        ⬅ Volver

    </a>

</div>

<script th:inline="javascript">

    let x = /*[[${resultado.x}]]*/ [];

    let y = /*[[${resultado.y}]]*/ [];

    /* CURVA PRINCIPAL */

    let curva = {

        x: x,

        y: y,

        mode: 'lines+markers',

        type: 'scatter',

        name: 'Funcion',

        line: {

            color: '#2f6bff',

            width: 4,

            shape: 'spline'

        },

        marker: {

            size: 8,

            color: '#8ec5ff'

        }

    };

    let data = [curva];

    let layout = {

        title: {

            text: 'Visualizacion Metodo Trapezoidal',

            font: {

                size: 24,

                color: '#ffffff'

            }

        },

        paper_bgcolor: '#10254d',

        plot_bgcolor: '#08152f',

        font: {

            color: '#ffffff'

        },

        xaxis: {

            title: 'X',

            gridcolor: 'rgba(255,255,255,0.1)',

            zerolinecolor: 'rgba(255,255,255,0.2)'

        },

        yaxis: {

            title: 'f(x)',

            gridcolor: 'rgba(255,255,255,0.1)',

            zerolinecolor: 'rgba(255,255,255,0.2)'

        },

        showlegend: true

    };

    Plotly.newPlot('grafica', data, layout);

    /* ANIMACION TRAPECIOS */

    let i = 0;

    function animarTrapecios(){

        if(i >= x.length - 1){

            return;

        }

        let trapecio = {

            x: [

                x[i],

                x[i],

                x[i + 1],

                x[i + 1]

            ],

            y: [

                0,

                y[i],

                y[i + 1],

                0

            ],

            fill: 'toself',

            type: 'scatter',

            mode: 'lines',

            fillcolor: 'rgba(47,107,255,0.3)',

            line: {

                color: 'rgba(47,107,255,0.9)',

                width: 2

            },

            name: 'Trapecio ' + (i + 1)

        };

        Plotly.addTraces('grafica', trapecio);

        i++;

    }

    setInterval(animarTrapecios, 1000);

</script>

</body>

</html>
