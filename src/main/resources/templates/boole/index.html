<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Metodo de Boole</title>

    <style>
        body {

            font-family: Arial;
            background-color: #d9d9d9;
            display: flex;
            justify-content: center;
            padding-top: 40px;

        }

        .contenedor {

            background-color: #2c2c2c;
            padding: 25px;
            border-radius: 15px;
            width: 550px;
            color: white;
            box-shadow: 0px 0px 15px black;

        }

        h1 {

            text-align: center;
            margin-bottom: 25px;

        }

        input {

            width: 95%;
            padding: 15px;
            font-size: 22px;
            margin-bottom: 20px;
            border: none;
            border-radius: 5px;
            background-color: #e6f5e6;

        }

        .grid {

            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 25px;

        }

        button {

            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #4a4a4a;
            color: white;

        }

        button:hover {

            background-color: #666;

        }

        .operador {

            background-color: #ff9500;

        }

        .funcion {

            background-color: #005bbb;

        }

        .control {

            background-color: #c62828;

        }

        .submit {

            width: 100%;
            margin-top: 20px;
            background-color: #2e7d32;
            font-size: 22px;

        }

        label {

            font-size: 18px;

        }

        .campo {

            margin-top: 15px;

        }

        .mensaje {

            background-color: #ffcc00;
            color: black;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;

        }

        .boton {

            display: flex;

            justify-content: center;

            margin-top: 30px;

        }

        .boton a {

            text-decoration: none;

            background-color: #1565c0;

            color: white;

            padding: 15px 25px;

            border-radius: 10px;

            font-size: 18px;

            transition: 0.3s;

        }

        .boton a:hover {

            background-color: #0d47a1;

        }
    </style>

</head>

<body>

    <div class="contenedor">

        <h1>Metodo de Boole</h1>

        <div th:if="${error}" style="
        background-color:#ff5252;
        color:white;
        padding:15px;
        border-radius:10px;
        margin-bottom:20px;
        text-align:center;
        font-weight:bold;
    ">

            <span th:text="${error}"></span>

        </div>

        <div class="mensaje">

            El numero de intervalos debe ser multiplo de 4

        </div>

        <form action="/boole/calcular" method="post">

            <label>Funcion</label>

            <input type="text" id="funcion" name="funcion" required>

            <div class="grid">

                <!-- FILA 1 -->

                <button type="button" class="funcion" onclick="agregar('sin(')">

                    sin

                </button>

                <button type="button" class="funcion" onclick="agregar('cos(')">

                    cos

                </button>

                <button type="button" class="funcion" onclick="agregar('tan(')">

                    tan

                </button>

                <button type="button" class="funcion" onclick="agregar('log(')">

                    ln

                </button>

                <button type="button" class="funcion" onclick="agregar('sqrt(')">

                    √

                </button>

                <!-- FILA 2 -->

                <button type="button" onclick="agregar('7')">

                    7

                </button>

                <button type="button" onclick="agregar('8')">

                    8

                </button>

                <button type="button" onclick="agregar('9')">

                    9

                </button>

                <button type="button" class="operador" onclick="agregar('/')">

                    ÷

                </button>

                <button type="button" class="operador" onclick="agregar('^')">

                    xʸ

                </button>

                <!-- FILA 3 -->

                <button type="button" onclick="agregar('4')">

                    4

                </button>

                <button type="button" onclick="agregar('5')">

                    5

                </button>

                <button type="button" onclick="agregar('6')">

                    6

                </button>

                <button type="button" class="operador" onclick="agregar('*')">

                    ×

                </button>

                <button type="button" onclick="agregar('x')">

                    x

                </button>

                <!-- FILA 4 -->

                <button type="button" onclick="agregar('1')">

                    1

                </button>

                <button type="button" onclick="agregar('2')">

                    2

                </button>

                <button type="button" onclick="agregar('3')">

                    3

                </button>

                <button type="button" class="operador" onclick="agregar('-')">

                    −

                </button>

                <button type="button" onclick="agregar('(')">

                    (

                </button>

                <!-- FILA 5 -->

                <button type="button" onclick="agregar('0')">

                    0

                </button>

                <button type="button" onclick="agregar('.')">

                    .

                </button>

                <button type="button" onclick="agregar('exp(')">

                    eˣ

                </button>

                <button type="button" class="operador" onclick="agregar('+')">

                    +

                </button>

                <button type="button" onclick="agregar(')')">

                    )

                </button>

                <!-- FILA 6 -->

                <button type="button" onclick="agregar('pi')">

                    π

                </button>

                <button type="button" onclick="agregar('^2')">

                    x²

                </button>

                <button type="button" onclick="agregar('^3')">

                    x³

                </button>

                <button type="button" onclick="agregar('sqrt(')">

                    ⁿ√x

                </button>

                <button type="button" onclick="agregar('abs(')">

                    |x|

                </button>

                <!-- FILA 7 -->

                <button type="button" class="control" onclick="borrar()">

                    ⌫

                </button>

                <button type="button" class="control" onclick="limpiar()">

                    AC

                </button>

            </div>

            <div class="campo">

                <label>Limite inferior</label>

                <input type="number" step="any" name="a" required>

            </div>

            <div class="campo">

                <label>Limite superior</label>

                <input type="number" step="any" name="b" required>

            </div>

            <div class="campo">

                <label>Numero de intervalos</label>

                <input type="number" name="n" required>

            </div>

            <button type="submit" class="submit">

                CALCULAR

            </button>

        </form>

        <div class="boton">

            <a th:href="@{/}">

                Regresar al Inicio

            </a>

        </div>

    </div>

    <script>

        function agregar(valor) {

            document.getElementById("funcion").value += valor;

        }

        function borrar() {

            let input =
                document.getElementById("funcion");

            input.value =
                input.value.slice(0, -1);

        }

        function limpiar() {

            document.getElementById("funcion").value = "";

        }

    </script>

</body>

</html>
