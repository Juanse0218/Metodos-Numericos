<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Resultado Metodo de Boole</title>

    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{

            --bg-main:#020617;
            --bg-secondary:#06142e;
            --bg-card:#10254d;

            --primary:#2f6bff;
            --primary-hover:#1f56d8;

            --text:#ffffff;
            --text-soft:#8ec5ff;

            --table-bg:#ffffff;
            --table-text:#111827;

        }

        body{

            font-family:Arial, sans-serif;

            background:linear-gradient(
                135deg,
                #020617,
                #06142e,
                #0b1f45
            );

            min-height:100vh;

            color:white;

        }

        /* NAVBAR */

        .navbar{

            width:100%;

            background:#08152f;

            padding:20px 40px;

            display:flex;

            justify-content:space-between;

            align-items:center;

            border-bottom:1px solid rgba(255,255,255,0.1);

            position:sticky;

            top:0;

            z-index:1000;

            backdrop-filter:blur(10px);

        }

        .logo{

            font-size:32px;

            font-weight:bold;

            color:white;

            letter-spacing:1px;

        }

        .nav-links{

            list-style:none;

            display:flex;

            gap:20px;

        }

        .nav-links a{

            text-decoration:none;

            color:white;

            padding:12px 18px;

            border-radius:12px;

            transition:0.3s;

            font-weight:500;

        }

        .nav-links a:hover{

            background:#284b9b;

            transform:translateY(-2px);

            box-shadow:0 0 15px rgba(47,107,255,0.5);

        }

        /* TITULO */

        h1{

            text-align:center;

            margin-top:35px;

            margin-bottom:15px;

            font-size:42px;

            letter-spacing:1px;

        }

        .resultado{

            text-align:center;

            font-size:30px;

            margin-bottom:30px;

            color:var(--text-soft);

            font-weight:bold;

        }

        .resultado span{

            color:white;

        }

        /* CONTENEDOR */

        .contenedor-principal{

            display:flex;

            gap:25px;

            align-items:flex-start;

            padding:20px 40px;

        }

        /* TABLA */

        .tabla-container{

            width:30%;

            background:rgba(16,37,77,0.95);

            border:1px solid rgba(47,107,255,0.3);

            padding:20px;

            border-radius:20px;

            backdrop-filter:blur(10px);

            box-shadow:0 0 25px rgba(0,0,0,0.4);

            overflow-y:auto;

            max-height:650px;

        }

        table{

            width:100%;

            border-collapse:collapse;

            color:white;

        }

        th{

            background:#2563eb;

            color:white;

            padding:14px;

            position:sticky;

            top:0;

        }

        td{

            padding:12px;

            text-align:center;

            border-bottom:1px solid rgba(255,255,255,0.1);

        }

        tr:nth-child(even){

            background:rgba(255,255,255,0.05);

        }

        tr:hover{

            background:rgba(47,107,255,0.2);

        }

        /* GRAFICA */

        .grafica-container{

            width:70%;

            background:rgba(16,37,77,0.95);

            border:1px solid rgba(47,107,255,0.3);

            padding:20px;

            border-radius:22px;

            backdrop-filter:blur(12px);

            box-shadow:
                    0 0 25px rgba(0,0,0,0.4),
                    inset 0 0 10px rgba(255,255,255,0.03);

        }

        #grafica{

            width:100%;

            height:600px;

        }

        /* BOTON */

        .boton{

            display:flex;

            justify-content:center;

            margin:45px;

        }

        .boton a{

            text-decoration:none;

            background:linear-gradient(
                    135deg,
                    var(--primary),
                    #2563eb
            );

            color:white;

            padding:16px 30px;

            border-radius:14px;

            font-size:18px;

            font-weight:bold;

            transition:0.3s;

            box-shadow:0 0 15px rgba(47,107,255,0.3);

        }

        .boton a:hover{

            background:linear-gradient(
                    135deg,
                    var(--primary-hover),
                    #1d4ed8
            );

            transform:translateY(-3px) scale(1.05);

            box-shadow:0 0 25px rgba(47,107,255,0.7);

        }

        /* SCROLL */

        ::-webkit-scrollbar{

            width:8px;

        }

        ::-webkit-scrollbar-thumb{

            background:#2563eb;

            border-radius:10px;

        }

        ::-webkit-scrollbar-track{

            background:#0f172a;

        }

        /* RESPONSIVE */

        @media(max-width:1000px){

            .contenedor-principal{

                flex-direction:column;

            }

            .tabla-container,
            .grafica-container{

                width:100%;

            }

            .navbar{

                flex-direction:column;

                gap:20px;

            }

            .nav-links{

                flex-wrap:wrap;

                justify-content:center;

            }

            h1{

                font-size:30px;

            }

            .resultado{

                font-size:24px;

            }

        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

    <div class="logo">
        CalculoING
    </div>

    <ul class="nav-links">

        <li>
            <a th:href="@{/}">
                 Inicio
            </a>
        </li>

        <li>
            <a th:href="@{/trapezoidal}">
                 Trapezoidal
            </a>
        </li>

        <li>
            <a th:href="@{/simpson13}">
                 Simpson 1/3
            </a>
        </li>

        <li>
            <a th:href="@{/simpson38}">
                 Simpson 3/8
            </a>
        </li>

        <li>
            <a th:href="@{/boole}">
                 Boole
            </a>
        </li>

        <li>
            <a th:href="@{/simpsonAbierto}">
                 Simpson Abierto
            </a>
        </li>

    </ul>

</nav>

<h1>METODO DE BOOLE</h1>

<div class="resultado">

    Resultado Aproximado:

    <span th:text="${resultado.resultado}"></span>

</div>

<div class="contenedor-principal">

    <!-- TABLA -->

    <div class="tabla-container">

        <table>

            <tr>

                <th>X</th>

                <th>f(X)</th>

            </tr>

            <tr th:each="p : ${resultado.puntos}">

                <td th:text="${p.x}"></td>

                <td th:text="${p.y}"></td>

            </tr>

        </table>

    </div>

    <!-- GRAFICA -->

    <div class="grafica-container">

        <div id="grafica"></div>

    </div>

</div>

<div class="boton">

    <a th:href="@{/boole}">

        ⬅ Volver

    </a>

</div>

<script th:inline="javascript">

    let x = /*[[${resultado.x}]]*/ [];

    let y = /*[[${resultado.y}]]*/ [];

    // =========================
    // GRAFICA INICIAL
    // =========================

    Plotly.newPlot('grafica', [], {

        title: {

            text: 'Visualizacion Metodo de Boole',

            font: {

                size: 26,
                color: '#ffffff'

            }

        },

        paper_bgcolor: '#10254d',

        plot_bgcolor: '#08152f',

        font: {

            color:'#ffffff'

        },

        xaxis: {

            title: 'X',

            gridcolor: 'rgba(255,255,255,0.1)',

            zerolinecolor:'#2563eb'

        },

        yaxis: {

            title: 'f(x)',

            gridcolor: 'rgba(255,255,255,0.1)',

            zerolinecolor:'#2563eb'

        },

        legend: {

            font: {

                color:'#ffffff'

            }

        }

    });

    // =========================
    // VARIABLES
    // =========================

    let puntosX = [];

    let puntosY = [];

    let i = 0;

    // =========================
    // ANIMACION
    // =========================

    function animarBoole(){

        if(i >= x.length){

            return;

        }

        puntosX.push(x[i]);

        puntosY.push(y[i]);

        let curva = {

            x: puntosX,

            y: puntosY,

            mode: 'lines+markers',

            type: 'scatter',

            name: 'Funcion',

            line: {

                color: '#3b82f6',

                width: 4,

                shape: 'spline'

            },

            marker: {

                size: 9,

                color: '#38bdf8',

                line:{

                    color:'#ffffff',

                    width:1.5

                }

            }

        };

        let data = [curva];

        // =========================
        // AREA BOOLE
        // =========================

        if(i >= 4){

            let area = {

                x: [

                    x[i - 4],
                    x[i - 4],
                    x[i - 3],
                    x[i - 2],
                    x[i - 1],
                    x[i],
                    x[i]

                ],

                y: [

                    0,
                    y[i - 4],
                    y[i - 3],
                    y[i - 2],
                    y[i - 1],
                    y[i],
                    0

                ],

                fill: 'toself',

                type: 'scatter',

                mode: 'lines',

                fillcolor: 'rgba(59,130,246,0.25)',

                line: {

                    color: 'rgba(59,130,246,0.9)',

                    width: 2

                },

                name: 'Area Boole'

            };

            data.push(area);

        }

        Plotly.react('grafica', data, {

            title: {

                text: 'Visualizacion Metodo de Boole',

                font: {

                    size: 26,
                    color:'#ffffff'

                }

            },

            paper_bgcolor: '#10254d',

            plot_bgcolor: '#08152f',

            font: {

                color:'#ffffff'

            },

            xaxis: {

                title: 'X',

                gridcolor: 'rgba(255,255,255,0.1)',

                zerolinecolor:'#2563eb'

            },

            yaxis: {

                title: 'f(x)',

                gridcolor: 'rgba(255,255,255,0.1)',

                zerolinecolor:'#2563eb'

            },

            legend: {

                font: {

                    color:'#ffffff'

                }

            }

        });

        i++;

    }

    // =========================
    // VELOCIDAD ANIMACION
    // =========================

    setInterval(animarBoole, 800);

</script>

</body>

</html>
