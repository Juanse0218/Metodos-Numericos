<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Metodo Trapezoidal</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family: Arial;
            background: linear-gradient(135deg,#1e293b,#0f172a,#2563eb);
            min-height:100vh;
            display:flex;

        }

        /* SIDEBAR */

.sidebar{

    width:260px;
    background:#111827;
    padding:30px 20px;
    min-height:100vh;
    border-radius:20px;
    box-shadow:4px 0 10px rgba(0,0,0,0.3);

}

.logo{

    color:white;
    font-size:32px;
    font-weight:bold;
    text-align:center;
    margin-bottom:40px;

}

.nav-links{

    list-style:none;

}

.nav-links li{

    margin-bottom:20px;

}

.nav-links a{

    display:block;
    text-decoration:none;
    color:white;
    padding:15px;
    border-radius:10px;
    transition:0.3s;
    font-size:18px;

}

.nav-links a:hover{

    background:#2563eb;
    transform:translateX(5px);

}

        /* CONTENIDO */

        .main-content{

            margin-left:260px;
            width:100%;
            display:flex;
            justify-content:center;
            align-items:flex-start;
            padding:40px;

        }

        .contenedor{

            background: rgba(44,44,44,0.95);
            backdrop-filter: blur(10px);
            padding:25px;
            border-radius:15px;
            width:700px;
            color:white;
            box-shadow:0px 0px 15px black;

        }

        h1{

            text-align:center;
            margin-bottom:25px;

        }

        input{

            width:95%;
            padding:15px;
            font-size:22px;
            margin-bottom:20px;
            border:none;
            border-radius:5px;
            background-color:#e6f5e6;

        }

        .grid{

            display:grid;
            grid-template-columns: repeat(5,1fr);
            gap:10px;
            margin-bottom:25px;

        }

        button{

            padding:15px;
            font-size:18px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            background-color:#4a4a4a;
            color:white;
            transition:0.3s;

        }

        button:hover{

            background-color:#666;
            transform:scale(1.05);

        }

        .operador{

            background-color:#ff9500;

        }

        .funcion{

            background-color:#005bbb;

        }

        .control{

            background-color:#c62828;

        }

        .submit{

            width:100%;
            margin-top:20px;
            background-color:#2e7d32;
            font-size:22px;

        }

        .submit:hover{

            background-color:#43a047;

        }

        label{

            font-size:18px;

        }

        .campo{

            margin-top:15px;

        }

        .formula{

            background:#0f172a;
            padding:15px;
            border-radius:10px;
            margin-bottom:20px;
            text-align:center;
            font-size:20px;
            color:#93c5fd;

        }

        @media(max-width:900px){

            .sidebar{

                width:100%;
                height:auto;
                position:relative;

            }

            .main-content{

                margin-left:0;
                padding:20px;

            }

            body{

                flex-direction:column;

            }

            .contenedor{

                width:100%;

            }

        }

    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">
            CalculoING
        </div>

        <ul class="nav-links">

            <li>
                <a th:href="@{/}">
                     Inicio
                </a>
            </li>

            <li>
                <a th:href="@{/trapezoidal}">
                     Trapezoidal
                </a>
            </li>

            <li>
                <a th:href="@{/simpson13}">
                     Simpson 1/3
                </a>
            </li>

            <li>
                <a th:href="@{/simpson38}">
                     Simpson 3/8
                </a>
            </li>

            <li>
                <a th:href="@{/boole}">
                     Boole
                </a>
            </li>

            <li>
                <a th:href="@{/simpsonAbierto}">
                     Simpson Abierto
                </a>
            </li>

        </ul>

    </div>

        <!-- CONTENIDO -->

        <div class="main-content">

            <div class="contenedor">

                <h1>METODO SIMPSON ABIERTO</h1>

                <div class="formula">

                    ∫f(x)dx ≈ (4h/3) [2f(x₁) - f(x₂) + 2f(x₃)]

                </div>

                <div th:if="${error}" style="
                    background-color:#c62828;
                    color:white;
                    padding:15px;
                    border-radius:10px;
                    margin-bottom:20px;
                    text-align:center;
                    font-weight:bold;
                ">

                    <span th:text="${error}"></span>

                </div>

                <form action="/simpsonAbierto/calcular" method="post">

                    <label>Funcion</label>

                    <input type="text" id="funcion" name="funcion" required>

                    <div class="grid">

                        <button type="button" class="funcion" onclick="agregar('sin(')">sin</button>

                        <button type="button" class="funcion" onclick="agregar('cos(')">cos</button>

                        <button type="button" class="funcion" onclick="agregar('tan(')">tan</button>

                        <button type="button" class="funcion" onclick="agregar('log(')">ln</button>

                        <button type="button" class="funcion" onclick="agregar('sqrt(')">√</button>

                        <button type="button" onclick="agregar('7')">7</button>

                        <button type="button" onclick="agregar('8')">8</button>

                        <button type="button" onclick="agregar('9')">9</button>

                        <button type="button" class="operador" onclick="agregar('/')">÷</button>

                        <button type="button" class="operador" onclick="agregar('^')">xʸ</button>

                        <button type="button" onclick="agregar('4')">4</button>

                        <button type="button" onclick="agregar('5')">5</button>

                        <button type="button" onclick="agregar('6')">6</button>

                        <button type="button" class="operador" onclick="agregar('*')">×</button>

                        <button type="button" onclick="agregar('x')">x</button>

                        <button type="button" onclick="agregar('1')">1</button>

                        <button type="button" onclick="agregar('2')">2</button>

                        <button type="button" onclick="agregar('3')">3</button>

                        <button type="button" class="operador" onclick="agregar('-')">−</button>

                        <button type="button" onclick="agregar('(')">(</button>

                        <button type="button" onclick="agregar('0')">0</button>

                        <button type="button" onclick="agregar('.')">.</button>

                        <button type="button" onclick="agregar('exp(')">eˣ</button>

                        <button type="button" class="operador" onclick="agregar('+')">+</button>

                        <button type="button" onclick="agregar(')')">)</button>

                        <button type="button" onclick="agregar('pi')">π</button>

                        <button type="button" onclick="agregar('^2')">x²</button>

                        <button type="button" onclick="agregar('^3')">x³</button>

                        <button type="button" onclick="agregar('sqrt(')">ⁿ√x</button>

                        <button type="button" onclick="agregar('abs(')">|x|</button>

                        <button type="button" class="control" onclick="borrar()">⌫</button>

                        <button type="button" class="control" onclick="limpiar()">AC</button>

                    </div>

                    <div class="campo">

                        <label>Limite inferior</label>

                        <input type="number" step="any" name="a" required>

                    </div>

                    <div class="campo">

                        <label>Limite superior</label>

                        <input type="number" step="any" name="b" required>

                    </div>

                    <div class="campo">

                        <label>Numero de intervalos</label>

                        <input type="number" name="n" min="2" step="2" required>

                    </div>

                    <button type="submit" class="submit">

                        CALCULAR

                    </button>

                </form>

                <div class="boton">

                    <a th:href="@{/}">

                        Regresar al Inicio

                    </a>

                </div>

            </div>

        </div>

    </div>

    <script>

        function agregar(valor) {

            document.getElementById("funcion").value += valor;

        }

        function borrar() {

            let input = document.getElementById("funcion");

            input.value = input.value.slice(0, -1);

        }

        function limpiar() {

            document.getElementById("funcion").value = "";

        }

        document.querySelector("form").addEventListener("submit", function (event) {

            let n = parseInt(
                document.querySelector('input[name="n"]').value
            );

            if (n % 2 !== 0) {

                alert("El numero de intervalos debe ser par");

                event.preventDefault();

            }

        });

    </script>

</body>

</html>
