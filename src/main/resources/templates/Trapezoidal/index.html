<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metodo Trapezoidal</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{
            --bg-main:#020617;
            --bg-secondary:#06142e;
            --bg-card:#10254d;

            --primary:#2f6bff;
            --primary-hover:#1f56d8;

            --button-dark:#1a2d5a;
            --button-hover:#28437f;

            --text:#ffffff;
            --text-soft:#c7d2fe;

            --border:#2f6bff;
        }

        body{
            font-family:Arial, sans-serif;
            background:linear-gradient(
                135deg,
                #020617,
                #06142e,
                #0b1f45
            );
            min-height:100vh;
            display:flex;
            overflow-x:hidden;
            color:white;
        }

        /* SIDEBAR */

        .sidebar{
            width:240px;
            background:#08152f;
            padding:25px 20px;
            min-height:100vh;
            border-right:1px solid rgba(255,255,255,0.1);
        }

        .logo{
            font-size:34px;
            font-weight:bold;
            text-align:center;
            margin-bottom:50px;
            color:white;
        }

        .nav-links{
            list-style:none;
        }

        .nav-links li{
            margin-bottom:15px;
        }

        .nav-links a{
            display:block;
            text-decoration:none;
            color:white;
            padding:15px;
            border-radius:12px;
            transition:0.3s;
            font-size:18px;
        }

        .nav-links a:hover{
            background:#284b9b;
        }

        .active{
            background:#284b9b;
        }

        /* MAIN */

        .main-content{
            flex:1;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .contenedor{
            width:100%;
            max-width:980px;

            background:rgba(16,37,77,0.95);
            border:1px solid rgba(47,107,255,0.3);

            border-radius:20px;
            padding:25px;

            backdrop-filter:blur(10px);

            box-shadow:0 0 25px rgba(0,0,0,0.4);
        }

        h1{
            text-align:center;
            margin-bottom:20px;
            font-size:38px;
        }

        .formula{
            background:#0b1f45;
            border:1px solid #2f6bff;

            padding:15px;
            border-radius:12px;

            margin-bottom:25px;

            text-align:center;
            font-size:24px;

            color:#8ec5ff;
        }

        /* ERROR */

        .error-box{
            background:#c62828;
            padding:15px;
            border-radius:10px;
            margin-bottom:20px;
            text-align:center;
            font-weight:bold;
        }

        /* FORM */

        .form-layout{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:25px;
        }

        .col-teclado,
        .col-campos{
            display:flex;
            flex-direction:column;
        }

        .col-campos{
            gap:20px;
        }

        label{
            margin-bottom:8px;
            color:var(--text-soft);
            font-size:18px;
            display:block;
        }

        input{
            width:100%;
            padding:14px;

            border-radius:10px;
            border:1px solid rgba(255,255,255,0.1);

            background:#08152f;
            color:white;

            font-size:18px;
            outline:none;
        }

        input:focus{
            border-color:#2f6bff;
            box-shadow:0 0 10px rgba(47,107,255,0.5);
        }

        .input-funcion{
            margin-bottom:18px;
        }

        /* TECLADO */

        .grid{
            display:grid;
            grid-template-columns:repeat(5,1fr);
            gap:10px;
        }

        button{
            padding:14px;
            border:none;
            border-radius:10px;

            cursor:pointer;

            color:white;
            font-size:16px;

            transition:0.3s;
        }

        button:hover{
            transform:scale(1.05);
        }

        .grid button{
            background:var(--button-dark);
        }

        .grid button:hover{
            background:var(--button-hover);
        }

        .operador{
            background:#1684d8 !important;
        }

        .funcion{
            background:#2563eb !important;
        }

        .control{
            background:#3156d3 !important;
        }

        /* BOTON */

        .submit{
            margin-top:auto;

            background:var(--primary);

            padding:18px;

            font-size:22px;
            font-weight:bold;

            border-radius:12px;
        }

        .submit:hover{
            background:var(--primary-hover);
        }

        /* RESPONSIVE */

        @media(max-width:900px){

            body{
                flex-direction:column;
            }

            .sidebar{
                width:100%;
                min-height:auto;
            }

            .form-layout{
                grid-template-columns:1fr;
            }

            .main-content{
                padding:15px;
            }

            h1{
                font-size:28px;
            }

        }

    </style>

</head>

<body>

    <!-- SIDEBAR -->

    <div class="sidebar">

        <div class="logo">
            CalculoING
        </div>

        <ul class="nav-links">

            <li>
                <a th:href="@{/}">
                    Inicio
                </a>
            </li>

            <li>
                <a class="active" th:href="@{/trapezoidal}">
                    Trapezoidal
                </a>
            </li>

            <li>
                <a th:href="@{/simpson13}">
                    Simpson 1/3
                </a>
            </li>

            <li>
                <a th:href="@{/simpson38}">
                    Simpson 3/8
                </a>
            </li>

            <li>
                <a th:href="@{/boole}">
                    Boole
                </a>
            </li>

            <li>
                <a th:href="@{/simpsonAbierto}">
                    Simpson Abierto
                </a>
            </li>

        </ul>

    </div>

    <!-- CONTENIDO -->

    <div class="main-content">

        <div class="contenedor">

            <h1>METODO TRAPEZOIDAL</h1>

            <div class="formula">
                ∫f(x)dx ≈ h/2 [f(x₀) + f(x₁)]
            </div>

            <!-- ERROR -->

            <div th:if="${error}" class="error-box">
                <span th:text="${error}"></span>
            </div>

            <!-- FORM -->

            <form action="/calcular" method="post">

                <div class="form-layout">

                    <!-- IZQUIERDA -->

                    <div class="col-teclado">

                        <div>

                            <label>Funcion</label>

                            <input
                                type="text"
                                id="funcion"
                                name="funcion"
                                class="input-funcion"
                                required
                            >

                        </div>

                        <div class="grid">

                            <!-- FILA 1 -->

                            <button type="button" class="funcion" onclick="agregar('sin(')">sin</button>
                            <button type="button" class="funcion" onclick="agregar('cos(')">cos</button>
                            <button type="button" class="funcion" onclick="agregar('tan(')">tan</button>
                            <button type="button" class="funcion" onclick="agregar('log(')">ln</button>
                            <button type="button" class="funcion" onclick="agregar('sqrt(')">√</button>

                            <!-- FILA 2 -->

                            <button type="button" onclick="agregar('7')">7</button>
                            <button type="button" onclick="agregar('8')">8</button>
                            <button type="button" onclick="agregar('9')">9</button>
                            <button type="button" class="operador" onclick="agregar('/')">÷</button>
                            <button type="button" class="operador" onclick="agregar('^')">xʸ</button>

                            <!-- FILA 3 -->

                            <button type="button" onclick="agregar('4')">4</button>
                            <button type="button" onclick="agregar('5')">5</button>
                            <button type="button" onclick="agregar('6')">6</button>
                            <button type="button" class="operador" onclick="agregar('*')">×</button>
                            <button type="button" onclick="agregar('x')">x</button>

                            <!-- FILA 4 -->

                            <button type="button" onclick="agregar('1')">1</button>
                            <button type="button" onclick="agregar('2')">2</button>
                            <button type="button" onclick="agregar('3')">3</button>
                            <button type="button" class="operador" onclick="agregar('-')">−</button>
                            <button type="button" onclick="agregar('(')">(</button>

                            <!-- FILA 5 -->

                            <button type="button" onclick="agregar('0')">0</button>
                            <button type="button" onclick="agregar('.')">.</button>
                            <button type="button" onclick="agregar('exp(')">eˣ</button>
                            <button type="button" class="operador" onclick="agregar('+')">+</button>
                            <button type="button" onclick="agregar(')')">)</button>

                            <!-- FILA 6 -->

                            <button type="button" onclick="agregar('pi')">π</button>
                            <button type="button" onclick="agregar('^2')">x²</button>
                            <button type="button" onclick="agregar('^3')">x³</button>
                            <button type="button" onclick="agregar('sqrt(')">ⁿ√x</button>
                            <button type="button" onclick="agregar('abs(')">|x|</button>

                            <!-- FILA 7 -->

                            <button type="button" class="control" onclick="borrar()">⌫</button>
                            <button type="button" class="control" onclick="limpiar()">AC</button>

                        </div>

                    </div>

                    <!-- DERECHA -->

                    <div class="col-campos">

                        <div>

                            <label>Limite inferior</label>

                            <input
                                type="number"
                                step="any"
                                name="a"
                                required
                            >

                        </div>

                        <div>

                            <label>Limite superior</label>

                            <input
                                type="number"
                                step="any"
                                name="b"
                                required
                            >

                        </div>

                        <div>

                            <label>Numero de trapecios</label>

                            <input
                                type="number"
                                name="n"
                                required
                            >

                        </div>

                        <button type="submit" class="submit">
                            CALCULAR
                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

    <script>

        function agregar(valor){
            document.getElementById("funcion").value += valor;
        }

        function borrar(){

            let input = document.getElementById("funcion");

            input.value = input.value.slice(0, -1);

        }

        function limpiar(){

            document.getElementById("funcion").value = "";

        }

    </script>

</body>
</html>
