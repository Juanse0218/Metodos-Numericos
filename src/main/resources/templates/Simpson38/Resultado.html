<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Resultado Metodo Simpson3/8</title>

    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

    <style>

        body{

            margin: 0;
            padding: 30px;

            font-family: Arial;

            background-color: #e9ecef;

        }

        h1{

            text-align: center;
            margin-bottom: 10px;

        }

        .resultado{

            text-align: center;

            font-size: 24px;

            margin-bottom: 30px;

            color: #1565c0;

            font-weight: bold;

        }

        .contenedor-principal{

            display: flex;

            gap: 20px;

            align-items: flex-start;

        }

        .tabla-container{

            width: 30%;

            background-color: white;

            padding: 20px;

            border-radius: 15px;

            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);

            overflow-y: auto;

            max-height: 650px;

        }

        .grafica-container{

            width: 70%;

            background-color: white;

            padding: 20px;

            border-radius: 15px;

            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);

        }

        table{

            width: 100%;

            border-collapse: collapse;

        }

        th{

            background-color: #1565c0;

            color: white;

            padding: 12px;

            position: sticky;

            top: 0;

        }

        td{

            padding: 10px;

            text-align: center;

            border-bottom: 1px solid #ddd;

        }

        tr:nth-child(even){

            background-color: #f5f5f5;

        }

        tr:hover{

            background-color: #dbeafe;

        }

        #grafica{

            width: 100%;

            height: 600px;

        }

        .boton{

            display: flex;

            justify-content: center;

            margin-top: 30px;

        }

        .boton a{

            text-decoration: none;

            background-color: #1565c0;

            color: white;

            padding: 15px 25px;

            border-radius: 10px;

            font-size: 18px;

            transition: 0.3s;

        }

        .boton a:hover{

            background-color: #0d47a1;

        }

    </style>

</head>

<body>

<h1>METODO DE SIMPSON 3/8</h1>

<div class="resultado">

    Resultado Aproximado:

    <span th:text="${resultado.resultado}"></span>

</div>

<div class="contenedor-principal">

    <!-- TABLA -->

    <div class="tabla-container">

        <table>

            <tr>

                <th>X</th>

                <th>f(X)</th>

            </tr>

            <tr th:each="p : ${resultado.puntos}">

                <td th:text="${p.x}"></td>

                <td th:text="${p.y}"></td>

            </tr>

        </table>

    </div>

    <!-- GRAFICA -->

    <div class="grafica-container">

        <div id="grafica"></div>

    </div>

</div>

<div class="boton">

    <a th:href="@{/simpson38}">

        Atras

    </a>

</div>

<script th:inline="javascript">

    let x = /*[[${resultado.x}]]*/ [];

    let y = /*[[${resultado.y}]]*/ [];

    // =========================
    // CURVA PRINCIPAL
    // =========================

    let curva = {

        x: x,

        y: y,

        mode: 'lines+markers',

        type: 'scatter',

        name: 'Funcion',

        line: {

            color: '#1565c0',

            width: 4,

            shape: 'spline'

        },

        marker: {

            size: 8,

            color: '#d32f2f'

        }

    };

    let data = [curva];

    let layout = {

        title: {

            text: 'Visualizacion Metodo Simpson 3/8',

            font: {

                size: 24

            }

        },

        paper_bgcolor: '#ffffff',

        plot_bgcolor: '#fafafa',

        xaxis: {

            title: 'X',

            gridcolor: '#d9d9d9'

        },

        yaxis: {

            title: 'f(x)',

            gridcolor: '#d9d9d9'

        },

        showlegend: true

    };

    Plotly.newPlot('grafica', data, layout);

    // =========================
    // ANIMACION TRAPECIOS
    // =========================

    let i = 0;

    function animarTrapecios(){

        if(i >= x.length - 1){

            return;

        }

        let trapecio = {

            x: [

                x[i],

                x[i],

                x[i + 1],

                x[i + 1]

            ],

            y: [

                0,

                y[i],

                y[i + 1],

                0

            ],

            fill: 'toself',

            type: 'scatter',

            mode: 'lines',

            fillcolor: 'rgba(21,101,192,0.3)',

            line: {

                color: 'rgba(21,101,192,0.9)',

                width: 2

            },

            name: 'Trapecio ' + (i + 1)

        };

        Plotly.addTraces('grafica', trapecio);

        i++;

    }

    setInterval(animarTrapecios, 1000);

</script>

</body>

</html>
