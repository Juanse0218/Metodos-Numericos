<!DOCTYPE html>
<html lang="es"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Resultado Metodo Trapezoidal</title>

    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family: Arial;
            background: linear-gradient(135deg,#1e293b,#0f172a,#2563eb);
            min-height:100vh;
            color:white;

        }

        /* NAVBAR */

        .navbar{

            width:100%;
            background:#233764;
            padding:20px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 4px 10px rgba(0,0,0,0.3);

        }

        .logo{

            font-size:30px;
            font-weight:bold;
            color:white;

        }

        .nav-links{

            list-style:none;
            display:flex;
            gap:20px;

        }

        .nav-links a{

            text-decoration:none;
            color:white;
            padding:10px 15px;
            border-radius:10px;
            transition:0.3s;

        }

        .nav-links a:hover{

            background:#2563eb;

        }

        /* TITULO */

        h1{

            text-align:center;
            margin-top:30px;
            margin-bottom:15px;
            font-size:40px;

        }

        .resultado{

            text-align:center;
            font-size:28px;
            margin-bottom:30px;
            color:#93c5fd;
            font-weight:bold;

        }

        /* CONTENEDOR */

        .contenedor-principal{

            display:flex;
            gap:20px;
            align-items:flex-start;
            padding:20px 40px;

        }

        /* TABLA */

        .tabla-container{

            width:30%;
            background: rgba(255,255,255,0.95);
            color:black;
            padding:20px;
            border-radius:20px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.3);
            overflow-y:auto;
            max-height:650px;

        }

        /* GRAFICA */

        .grafica-container{

            width:70%;
            background: rgba(255,255,255,0.95);
            padding:20px;
            border-radius:20px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.3);

        }

        table{

            width:100%;
            border-collapse:collapse;

        }

        th{

            background-color:#1565c0;
            color:white;
            padding:12px;
            position:sticky;
            top:0;

        }

        td{

            padding:10px;
            text-align:center;
            border-bottom:1px solid #ddd;

        }

        tr:nth-child(even){

            background-color:#f5f5f5;

        }

        tr:hover{

            background-color:#dbeafe;

        }

        #grafica{

            width:100%;
            height:600px;

        }

        .boton{

            display:flex;
            justify-content:center;
            margin:40px;

        }

        .boton a{

            text-decoration:none;
            background-color:#1565c0;
            color:white;
            padding:15px 25px;
            border-radius:10px;
            font-size:18px;
            transition:0.3s;

        }

        .boton a:hover{

            background-color:#0d47a1;
            transform:scale(1.05);

        }

        /* RESPONSIVE */

        @media(max-width:1000px){

            .contenedor-principal{

                flex-direction:column;

            }

            .tabla-container,
            .grafica-container{

                width:100%;

            }

            .navbar{

                flex-direction:column;
                gap:20px;

            }

            .nav-links{

                flex-wrap:wrap;
                justify-content:center;

            }

        }

    </style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

    <div class="logo">
        CalculoING
    </div>

    <ul class="nav-links">

        <li>
            <a th:href="@{/}">
                 Inicio
            </a>
        </li>

        <li>
            <a th:href="@{/trapezoidal}">
                 Trapezoidal
            </a>
        </li>

        <li>
            <a th:href="@{/simpson13}">
                 Simpson 1/3
            </a>
        </li>

        <li>
            <a th:href="@{/simpson38}">
                 Simpson 3/8
            </a>
        </li>

        <li>
            <a th:href="@{/boole}">
                 Boole
            </a>
        </li>

        <li>
            <a th:href="@{/simpsonAbierto}">
                 Simpson Abierto
            </a>
        </li>

    </ul>

</nav>

<!-- TITULO -->

<h1>Metodo Trapezoidal</h1>

<div class="resultado">

    Resultado Aproximado:

    <span th:text="${resultado.resultado}"></span>

</div>

<!-- CONTENIDO -->

<div class="contenedor-principal">

    <!-- TABLA -->

    <div class="tabla-container">

        <table>

            <tr>

                <th>X</th>

                <th>f(X)</th>

            </tr>

            <tr th:each="p : ${resultado.puntos}">

                <td th:text="${p.x}"></td>

                <td th:text="${p.y}"></td>

            </tr>

        </table>

    </div>

    <!-- GRAFICA -->

    <div class="grafica-container">

        <div id="grafica"></div>

    </div>

</div>

<!-- BOTON -->

<div class="boton">

    <a th:href="@{/trapezoidal}">

        ⬅ Volver

    </a>

</div>

<script th:inline="javascript">

    let x = /*[[${resultado.x}]]*/ [];

    let y = /*[[${resultado.y}]]*/ [];

    // CURVA PRINCIPAL

    let curva = {

        x: x,

        y: y,

        mode: 'lines+markers',

        type: 'scatter',

        name: 'Funcion',

        line: {

            color: '#1565c0',

            width: 4,

            shape: 'spline'

        },

        marker: {

            size: 8,

            color: '#d32f2f'

        }

    };

    let data = [curva];

    let layout = {

        title: {

            text: 'Visualizacion Metodo Trapezoidal',

            font: {

                size: 24

            }

        },

        paper_bgcolor: '#ffffff',

        plot_bgcolor: '#fafafa',

        xaxis: {

            title: 'X',

            gridcolor: '#d9d9d9'

        },

        yaxis: {

            title: 'f(x)',

            gridcolor: '#d9d9d9'

        },

        showlegend: true

    };

    Plotly.newPlot('grafica', data, layout);

    // ANIMACION TRAPECIOS

    let i = 0;

    function animarTrapecios(){

        if(i >= x.length - 1){

            return;

        }

        let trapecio = {

            x: [

                x[i],

                x[i],

                x[i + 1],

                x[i + 1]

            ],

            y: [

                0,

                y[i],

                y[i + 1],

                0

            ],

            fill: 'toself',

            type: 'scatter',

            mode: 'lines',

            fillcolor: 'rgba(21,101,192,0.3)',

            line: {

                color: 'rgba(21,101,192,0.9)',

                width: 2

            },

            name: 'Trapecio ' + (i + 1)

        };

        Plotly.addTraces('grafica', trapecio);

        i++;

    }

    setInterval(animarTrapecios, 1000);

</script>

</body>

</html>
