<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Simpson Abierto</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        :root{

            --bg-main:#020617;
            --bg-secondary:#06142e;
            --bg-card:#10254d;

            --primary:#2f6bff;
            --primary-hover:#1f56d8;

            --button-dark:#1a2d5a;
            --button-hover:#28437f;

            --text:#ffffff;
            --text-soft:#c7d2fe;

            --border:#2f6bff;

        }

        body{

            font-family:Arial, sans-serif;

            background:linear-gradient(
                135deg,
                #020617,
                #06142e,
                #0b1f45
            );

            min-height:100vh;

            display:flex;

            overflow-x:hidden;

            color:white;

        }

        /* SIDEBAR */

        .sidebar{

            width:240px;

            background:#08152f;

            padding:25px 20px;

            min-height:100vh;

            border-right:1px solid rgba(255,255,255,0.1);

        }

        .logo{

            color:white;

            font-size:34px;

            font-weight:bold;

            text-align:center;

            margin-bottom:50px;

        }

        .nav-links{

            list-style:none;

        }

        .nav-links li{

            margin-bottom:15px;

        }

        .nav-links a{

            display:block;

            text-decoration:none;

            color:white;

            padding:15px;

            border-radius:12px;

            transition:0.3s;

            font-size:18px;

        }

        .nav-links a:hover{

            background:#284b9b;

            transform:translateX(5px);

        }

        .active{

            background:#284b9b;

        }

        /* CONTENIDO */

        .main-content{

            flex:1;

            display:flex;

            justify-content:center;

            align-items:center;

            padding:20px;

        }

        .contenedor{

            background:rgba(16,37,77,0.95);

            border:1px solid rgba(47,107,255,0.3);

            backdrop-filter:blur(10px);

            padding:25px;

            border-radius:20px;

            width:100%;

            max-width:980px;

            color:white;

            box-shadow:0 0 25px rgba(0,0,0,0.4);

        }

        h1{

            text-align:center;

            margin-bottom:20px;

            font-size:38px;

        }

        .formula{

            background:#0b1f45;

            border:1px solid #2f6bff;

            padding:15px;

            border-radius:12px;

            margin-bottom:25px;

            text-align:center;

            font-size:24px;

            color:#8ec5ff;

        }

        .error-box{

            background:#c62828;

            color:white;

            padding:15px;

            border-radius:10px;

            margin-bottom:20px;

            text-align:center;

            font-weight:bold;

        }

        /* LAYOUT */

        .form-layout{

            display:grid;

            grid-template-columns:1fr 1fr;

            gap:25px;

            align-items:start;

        }

        .col-teclado{

            display:flex;

            flex-direction:column;

        }

        .col-campos{

            display:flex;

            flex-direction:column;

            gap:20px;

        }

        label{

            font-size:18px;

            margin-bottom:8px;

            display:block;

            color:var(--text-soft);

        }

        input{

            width:100%;

            padding:14px;

            font-size:18px;

            border:none;

            border-radius:10px;

            background:#08152f;

            color:white;

            outline:none;

            border:1px solid rgba(255,255,255,0.1);

        }

        input:focus{

            border-color:#2f6bff;

            box-shadow:0 0 10px rgba(47,107,255,0.5);

        }

        .input-funcion{

            margin-bottom:18px;

        }

        /* GRID BOTONES */

        .grid{

            display:grid;

            grid-template-columns:repeat(5,1fr);

            gap:10px;

        }

        button{

            padding:14px;

            font-size:16px;

            border:none;

            border-radius:10px;

            cursor:pointer;

            color:white;

            transition:0.3s;

        }

        button:hover{

            transform:translateY(-3px) scale(1.05);

            box-shadow:0 0 15px rgba(47,107,255,0.6);

        }

        button:active{

            transform:scale(0.95);

        }

        .grid button{

            background:var(--button-dark);

        }

        .grid button:hover{

            background:var(--button-hover);

        }

        .operador{

            background:#1684d8 !important;

        }

        .funcion{

            background:#2563eb !important;

        }

        .control{

            background:#3156d3 !important;

        }

        /* BOTON CALCULAR */

        .submit{

            width:100%;

            padding:18px;

            background:var(--primary);

            font-size:22px;

            font-weight:bold;

            border-radius:12px;

            border:none;

            color:white;

            cursor:pointer;

            transition:0.3s;

        }

        .submit:hover{

            background:var(--primary-hover);

            box-shadow:0 0 20px rgba(47,107,255,0.8);

            transform:translateY(-2px);

        }

        /* RESPONSIVE */

        @media(max-width:900px){

            body{

                flex-direction:column;

            }

            .sidebar{

                width:100%;

                min-height:auto;

            }

            .main-content{

                padding:15px;

                align-items:flex-start;

            }

            .contenedor{

                width:100%;

            }

            .form-layout{

                grid-template-columns:1fr;

            }

            h1{

                font-size:30px;

            }

        }

    </style>
</head>

<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="logo">CalculoING</div>
        <ul class="nav-links">
            <li><a th:href="@{/}">Inicio</a></li>
            <li><a th:href="@{/trapezoidal}">Trapezoidal</a></li>
            <li><a th:href="@{/simpson13}">Simpson 1/3</a></li>
            <li><a th:href="@{/simpson38}">Simpson 3/8</a></li>
            <li><a th:href="@{/boole}">Boole</a></li>
            <li><a th:href="@{/simpsonAbierto}">Simpson Abierto</a></li>
        </ul>
    </div>

    <!-- CONTENIDO -->
    <div class="main-content">
        <div class="contenedor">

            <h1>METODO SIMPSON 3/8</h1>

            <div class="formula">
                ∫f(x)dx ≈ (3h/8) [f(x₀) + 3f(x₁) + 3f(x₂) + f(x₃)]
            </div>

            <div th:if="${error}" class="error-box">
                <span th:text="${error}"></span>
            </div>

            <form action="/simpson38/calcular" method="post">

                <div class="form-layout">

                    <!-- COLUMNA IZQUIERDA: función + teclado -->
                    <div class="col-teclado">

                        <label>Funcion</label>
                        <input type="text" id="funcion" name="funcion" class="input-funcion" required>

                        <div class="grid">
                            <button type="button" class="funcion" onclick="agregar('sin(')">sin</button>
                            <button type="button" class="funcion" onclick="agregar('cos(')">cos</button>
                            <button type="button" class="funcion" onclick="agregar('tan(')">tan</button>
                            <button type="button" class="funcion" onclick="agregar('log(')">ln</button>
                            <button type="button" class="funcion" onclick="agregar('sqrt(')">√</button>

                            <button type="button" onclick="agregar('7')">7</button>
                            <button type="button" onclick="agregar('8')">8</button>
                            <button type="button" onclick="agregar('9')">9</button>
                            <button type="button" class="operador" onclick="agregar('/')">÷</button>
                            <button type="button" class="operador" onclick="agregar('^')">xʸ</button>

                            <button type="button" onclick="agregar('4')">4</button>
                            <button type="button" onclick="agregar('5')">5</button>
                            <button type="button" onclick="agregar('6')">6</button>
                            <button type="button" class="operador" onclick="agregar('*')">×</button>
                            <button type="button" onclick="agregar('x')">x</button>

                            <button type="button" onclick="agregar('1')">1</button>
                            <button type="button" onclick="agregar('2')">2</button>
                            <button type="button" onclick="agregar('3')">3</button>
                            <button type="button" class="operador" onclick="agregar('-')">−</button>
                            <button type="button" onclick="agregar('(')">(</button>

                            <button type="button" onclick="agregar('0')">0</button>
                            <button type="button" onclick="agregar('.')">.</button>
                            <button type="button" onclick="agregar('exp(')">eˣ</button>
                            <button type="button" class="operador" onclick="agregar('+')">+</button>
                            <button type="button" onclick="agregar(')')">)</button>

                            <button type="button" onclick="agregar('pi')">π</button>
                            <button type="button" onclick="agregar('^2')">x²</button>
                            <button type="button" onclick="agregar('^3')">x³</button>
                            <button type="button" onclick="agregar('sqrt(')">ⁿ√x</button>
                            <button type="button" onclick="agregar('abs(')">|x|</button>

                            <button type="button" class="control" onclick="borrar()">⌫</button>
                            <button type="button" class="control" onclick="limpiar()">AC</button>
                        </div>

                    </div>

                    <!-- COLUMNA DERECHA: parámetros + calcular -->
                    <div class="col-campos">

                        <div>
                            <label>Limite inferior</label>
                            <input type="number" step="any" name="a" required>
                        </div>

                        <div>
                            <label>Limite superior</label>
                            <input type="number" step="any" name="b" required>
                        </div>

                        <div>
                            <label>Numero de intervalos</label>
                            <input type="number" name="n" min="3" step="3" required>
                        </div>

                        <button type="submit" class="submit">CALCULAR</button>

                    </div>

                </div>

            </form>

            <div class="boton">
                <a th:href="@{/}">Regresar al Inicio</a>
            </div>

        </div>
    </div>

    <script>
        function agregar(valor) {
            document.getElementById("funcion").value += valor;
        }
        function borrar() {
            let input = document.getElementById("funcion");
            input.value = input.value.slice(0, -1);
        }
        function limpiar() {
            document.getElementById("funcion").value = "";
        }
    </script>

</body>
</html>
